<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Loué App — Quitus</title>
<link rel="apple-touch-icon" href="logo.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Quitus">
<meta name="theme-color" content="#1A2B4A">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--orange:#D95818;--bg:#F2F0EC;--card:#FFF;--text:#141210;--muted:#6A6460;--border:#D8D4CE;--border2:#B8B4AE;--blue:#1454A0;--blue-l:#DCE8F8;--green:#196B3B;--green-l:#E1F2E9;--red:#B32E2E;--red-l:#FAE8E8;--purple:#6B3FA0;--purple-l:#EDE8F8;--teal:#0D7A6B;--teal-l:#E0F5F2;--header-bg:#1A2B4A;--r:8px;--rl:12px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:90px;}
.topbar{background:var(--header-bg);padding:0 16px;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;}
.tb-left{display:flex;align-items:center;gap:9px;}
.tb-sq{width:26px;height:26px;background:var(--green);border-radius:5px;display:flex;align-items:center;justify-content:center;}
.tb-sq svg{width:13px;height:13px;stroke:white;fill:none;stroke-width:2.5;}
.tb-name{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:white;}
.tb-badge{background:var(--green);color:white;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;}
.main{padding:14px;max-width:860px;margin:0 auto;}
.section{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);margin-bottom:12px;overflow:hidden;}
.section-head{display:flex;align-items:center;gap:9px;padding:12px 16px;border-bottom:1px solid var(--border);background:#FAFAF8;}
.section-head svg{width:15px;height:15px;flex-shrink:0;}
.section-title{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;}
.section-body{padding:14px 16px;}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:480px){.meta-grid{grid-template-columns:1fr;}}
.meta-full{grid-column:1/-1;}
.meta-field{display:flex;flex-direction:column;gap:4px;}
.meta-label{font-size:11px;color:var(--muted);font-weight:500;}
.meta-input{padding:9px 12px;border:1px solid var(--border);border-radius:var(--r);font-size:13.5px;font-family:'DM Sans',sans-serif;background:var(--bg);outline:none;color:var(--text);width:100%;}
.meta-input:focus{border-color:var(--green);background:white;}
.meta-input[readonly]{background:#EFECE8;color:var(--muted);cursor:default;}
.meta-input.error{border-color:var(--red)!important;background:#FFF0F0!important;}
textarea.meta-input{min-height:80px;resize:vertical;line-height:1.6;}
/* Soldé */
.solde-row{display:flex;gap:10px;}
.solde-btn{flex:1;padding:12px;border-radius:var(--r);border:2px solid var(--border);background:var(--bg);font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:.15s;text-align:center;}
.solde-btn.oui.active{background:var(--green-l);border-color:var(--green);color:var(--green);}
.solde-btn.non.active{background:var(--red-l);border-color:var(--red);color:var(--red);}
/* Signature */
.sig-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.sig-box{border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;}
.sig-label{font-size:11px;font-weight:700;color:var(--muted);padding:7px 12px;background:#FAFAF8;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.4px;}
.sig-canvas-wrap{background:white;position:relative;}
canvas.sig{display:block;width:100%;height:150px;touch-action:none;cursor:crosshair;background:white;}
.sig-clear{position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.sig-clear svg{width:12px;height:12px;}
/* Photos */
.photo-add-btn{display:flex;align-items:center;gap:8px;padding:11px 15px;background:var(--bg);border:1.5px dashed var(--border2);border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--muted);width:100%;margin-bottom:10px;}
.photo-add-btn svg{width:16px;height:16px;flex-shrink:0;}
.photos-list{display:flex;flex-direction:column;gap:10px;}
.photo-item{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.photo-item-head{display:flex;align-items:center;gap:8px;padding:8px 12px;background:white;border-bottom:1px solid var(--border);}
.photo-item-num{font-family:'Syne',sans-serif;font-weight:700;font-size:11px;color:var(--teal);}
.photo-item-label{flex:1;border:none;background:none;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;}
.photo-item-label::placeholder{color:var(--muted);}
.photo-del{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.photo-del svg{width:13px;height:13px;}
.photo-preview-img{width:100%;max-height:320px;object-fit:contain;display:block;background:#f0ede8;}
/* Destinataires */
.dest-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;min-height:4px;}
.dest-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:var(--teal-l);border:1px solid var(--teal);border-radius:20px;font-size:12px;color:var(--teal);font-weight:500;}
.dest-chip button{background:none;border:none;cursor:pointer;color:var(--teal);display:flex;align-items:center;padding:0;}
.dest-chip button svg{width:11px;height:11px;}
.dest-row{display:flex;gap:8px;position:relative;}
.dest-input{flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-family:'DM Sans',sans-serif;background:var(--bg);outline:none;color:var(--text);}
.dest-input:focus{border-color:var(--teal);background:white;}
.dest-suggestions{position:absolute;top:100%;left:0;right:60px;background:white;border:1px solid var(--border);border-radius:var(--r);z-index:50;max-height:160px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,.1);display:none;}
.dest-suggestions.open{display:block;}
.dest-sugg-item{padding:9px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--bg);}
.dest-sugg-item:hover{background:var(--teal-l);}
.dest-sugg-item small{color:var(--muted);font-size:11px;margin-left:6px;}
/* Boutons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 15px;border-radius:var(--r);font-size:13.5px;font-weight:500;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:.15s;}
.btn-secondary{background:var(--card);color:var(--text);border:1px solid var(--border);}
.btn-green{background:var(--green);color:white;}
.btn-sm{padding:7px 11px;font-size:12px;}
.val-banner{background:var(--red-l);border:1px solid #EFC0C0;border-radius:var(--r);padding:10px 14px;margin-bottom:12px;display:none;font-size:13px;color:var(--red);align-items:center;gap:8px;}
.val-banner.show{display:flex;}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:12px 16px;display:flex;gap:10px;z-index:15;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(40px);background:var(--text);color:white;padding:10px 16px;border-radius:var(--r);font-size:13px;z-index:300;opacity:0;transition:.25s;white-space:nowrap;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.pdf-modal{position:fixed;inset:0;background:rgba(20,18,16,.7);z-index:150;display:none;align-items:center;justify-content:center;padding:16px;}
.pdf-modal.open{display:flex;}
.pdf-inner{background:white;border-radius:var(--rl);width:100%;max-width:800px;max-height:90vh;display:flex;flex-direction:column;}
.pdf-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);}
.pdf-head-title{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;}
.pdf-close{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.pdf-close svg{width:13px;height:13px;}
#pdfContent{overflow-y:auto;padding:20px;font-family:Arial,sans-serif;font-size:11px;flex:1;}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-left">
    <div class="tb-sq"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
    <span class="tb-name">Loué App</span>
  </div>
  <span class="tb-badge">Quitus</span>
  <button class="btn btn-secondary btn-sm" onclick="openPreview()" style="color:var(--text)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    Aperçu
  </button>
</div>

<div class="main">

  <div class="val-banner" id="valBanner">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="valMsg"></span>
  </div>

  <!-- DESTINATAIRES -->
  <div class="section">
    <div class="section-head">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--teal)" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      <span class="section-title" style="color:var(--teal)">Destinataires</span>
    </div>
    <div class="section-body">
      <div style="font-size:11.5px;color:var(--muted);margin-bottom:8px;">Vous recevrez automatiquement une copie.</div>
      <div class="dest-chips" id="dest-chips"></div>
      <div class="dest-row">
        <input class="dest-input" id="dest-input" type="email" placeholder="nom@email.com" autocomplete="off"
          oninput="filterDest(this.value)"
          onkeydown="if(event.key==='Enter'){event.preventDefault();addDest();}">
        <div class="dest-suggestions" id="dest-sugg"></div>
        <button class="btn btn-secondary btn-sm" onclick="addDest()">+ Ajouter</button>
      </div>
    </div>
  </div>

  <!-- INFORMATIONS -->
  <div class="section">
    <div class="section-head">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      <span class="section-title" style="color:var(--green)">Informations</span>
    </div>
    <div class="section-body">
      <div class="meta-grid">
        <div class="meta-field meta-full">
          <div class="meta-label">Chantier <span style="color:var(--red)">*</span></div>
          <input class="meta-input" id="meta-chantier" placeholder="Choisir ou saisir…" list="chantiers-list" autocomplete="off" oninput="onChantierChange(this.value)">
          <datalist id="chantiers-list"></datalist>
        </div>
        <div class="meta-field">
          <div class="meta-label">Date</div>
          <input class="meta-input" id="meta-date" readonly>
        </div>
        <div class="meta-field">
          <div class="meta-label">Heure</div>
          <input class="meta-input" id="meta-heure" readonly>
        </div>
        <div class="meta-field meta-full">
          <div class="meta-label">Intervenant <span style="color:var(--red)">*</span></div>
          <input class="meta-input" id="meta-intervenant" placeholder="Nom de l'intervenant…" list="intervenants-list" autocomplete="off">
          <datalist id="intervenants-list"></datalist>
        </div>
        <div class="meta-field meta-full">
          <div class="meta-label">Description Intervention <span style="color:var(--red)">*</span></div>
          <textarea class="meta-input" id="meta-description" placeholder="Description de l'intervention…"></textarea>
        </div>
      </div>
    </div>
  </div>

  <!-- PHOTO (obligatoire) -->
  <div class="section">
    <div class="section-head">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--teal)" stroke-width="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
      <span class="section-title" style="color:var(--teal)">Photo / Croquis <span style="color:var(--red)">*</span></span>
    </div>
    <div class="section-body">
      <input type="file" id="photo-input" accept="image/*" capture="environment" multiple style="display:none" onchange="handlePhotos(this.files)">
      <button class="photo-add-btn" onclick="document.getElementById('photo-input').click()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
        Prendre une photo ou choisir dans la galerie
      </button>
      <div class="photos-list" id="photos-list"></div>
    </div>
  </div>

  <!-- SOLDÉ -->
  <div class="section">
    <div class="section-head">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <span class="section-title" style="color:var(--green)">Soldé <span style="color:var(--red)">*</span></span>
    </div>
    <div class="section-body">
      <div class="solde-row">
        <button class="solde-btn oui" id="solde-oui" onclick="setSolde('OUI')">✓ OUI</button>
        <button class="solde-btn non" id="solde-non" onclick="setSolde('NON')">✗ NON</button>
      </div>
    </div>
  </div>

  <!-- SIGNATURES -->
  <div class="section">
    <div class="section-head">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg>
      <span class="section-title" style="color:var(--green)">Signatures</span>
    </div>
    <div class="section-body">
      <div class="sig-row">
        <div class="sig-box">
          <div class="sig-label">Entreprise Loué</div>
          <div class="sig-canvas-wrap">
            <canvas class="sig" id="sig-loue" width="300" height="150"></canvas>
            <button class="sig-clear" onclick="clearSig('sig-loue')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg></button>
          </div>
        </div>
        <div class="sig-box">
          <div class="sig-label">Client</div>
          <div class="sig-canvas-wrap">
            <canvas class="sig" id="sig-intervenant" width="300" height="150"></canvas>
            <button class="sig-clear" onclick="clearSig('sig-intervenant')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg></button>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <button class="btn btn-secondary" onclick="window.location.href='index.html'" style="padding:10px 14px">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="15 18 9 12 15 6"/></svg>
    Retour
  </button>
  <button class="btn btn-green" id="btn-envoyer" onclick="sendDoc()" style="flex:1;justify-content:center">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
    Envoyer le quitus
  </button>
</div>

<!-- PDF MODAL -->
<div class="pdf-modal" id="pdfModal">
  <div class="pdf-inner">
    <div class="pdf-head">
      <span class="pdf-head-title">Aperçu PDF</span>
      <button class="pdf-close" onclick="document.getElementById('pdfModal').classList.remove('open')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div id="pdfContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw4iyVmaDgXTrq-yO-QArwhWbY57Ny0U8hCHcUq45Mxi7ZwheCFOQpfOAoX0oSD3QaUFQ/exec';
const TYPE_DOC = 'quitus';

let photos = [];
let destinataires = [];
let soldeVal = '';
let MOI = {name:'', email:''};
let ALL_DEST = [];
let ALL_CHANTIERS = [];

(function(){
  const now=new Date(), pad=n=>String(n).padStart(2,'0');
  document.getElementById('meta-date').value=`${pad(now.getDate())}/${pad(now.getMonth()+1)}/${now.getFullYear()}`;
  document.getElementById('meta-heure').value=`${pad(now.getHours())}h${pad(now.getMinutes())}`;
  loadContacts();
  initSig('sig-loue'); initSig('sig-intervenant');
})();

function setSolde(v){
  soldeVal=v;
  document.getElementById('solde-oui').classList.toggle('active',v==='OUI');
  document.getElementById('solde-non').classList.toggle('active',v==='NON');
}

function loadContacts(){
  if(!APPS_SCRIPT_URL) return;
  window._quitCB=function(data){
    clearTimeout(window._quitTO);
    if(data){
      if(data.contacts){
        const dl=document.getElementById('intervenants-list'); dl.innerHTML='';
        data.contacts.forEach(c=>{dl.innerHTML+=`<option value="${c.nom}">`;});
        const moiDefaut=data.contacts.find(c=>c.conducteurDefaut==='O');
        if(moiDefaut){MOI={name:moiDefaut.nom,email:moiDefaut.email};}
        ALL_DEST=data.contactNotes||[];
        window._allContacts=data.contacts||[];
      }
      if(data.chantiers){
        ALL_CHANTIERS=data.chantiers;
        const dl=document.getElementById('chantiers-list'); dl.innerHTML='';
        data.chantiers.forEach(c=>{dl.innerHTML+=`<option value="${c.nom}">`;});
      }
    }
    delete window._quitCB; delete window._quitTO;
    const s=document.getElementById('_jsonp_quit'); if(s) s.remove();
  };
  window._quitTO=setTimeout(()=>{if(window._quitCB){delete window._quitCB;}},10000);
  const sc=document.createElement('script'); sc.id='_jsonp_quit';
  sc.src=APPS_SCRIPT_URL+'?action=getContacts&callback=_quitCB&t='+Date.now();
  document.head.appendChild(sc);
}

function onChantierChange(val){
  if(!val||!ALL_CHANTIERS.length) return;
  const ch=ALL_CHANTIERS.find(x=>x.nom.toLowerCase()===val.toLowerCase());
  if(ch&&ch.conducteur){
    const contact=ALL_DEST.find(x=>x.nom&&x.nom.toLowerCase()===ch.conducteur.toLowerCase());
    if(contact) MOI={name:contact.nom,email:contact.email};
    else{
      const cu=(window._allContacts||[]).find(x=>x.nom&&x.nom.toLowerCase()===ch.conducteur.toLowerCase());
      if(cu) MOI={name:cu.nom,email:cu.email||''};
    }
  }
}

function filterDest(val){
  const sugg=document.getElementById('dest-sugg');
  if(!val||val.length<1){sugg.classList.remove('open');return;}
  const m=ALL_DEST.filter(u=>u.nom.toLowerCase().includes(val.toLowerCase())||u.email.toLowerCase().includes(val.toLowerCase()));
  if(!m.length){sugg.classList.remove('open');return;}
  sugg.innerHTML=m.map(u=>`<div class="dest-sugg-item" onclick="selectDest('${u.email}')">${u.nom} <small>${u.email}</small></div>`).join('');
  sugg.classList.add('open');
}
function selectDest(email){document.getElementById('dest-input').value=email;document.getElementById('dest-sugg').classList.remove('open');addDest();}
function addDest(){
  const input=document.getElementById('dest-input');
  const val=input.value.trim(); if(!val) return;
  if(!val.includes('@')||!val.includes('.')){input.style.borderColor='var(--red)';setTimeout(()=>input.style.borderColor='',2000);return;}
  if(destinataires.includes(val)){input.value='';return;}
  destinataires.push(val); renderDest(); input.value='';
  document.getElementById('dest-sugg').classList.remove('open');
}
function removeDest(i){destinataires.splice(i,1);renderDest();}
function renderDest(){
  document.getElementById('dest-chips').innerHTML=destinataires.map((d,i)=>`
    <span class="dest-chip">${d}<button onclick="removeDest(${i})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></span>`).join('');
}
document.addEventListener('click',e=>{if(!e.target.closest('.dest-row'))document.getElementById('dest-sugg').classList.remove('open');});

function handlePhotos(files){
  Array.from(files).forEach(f=>{
    const r=new FileReader();
    r.onload=e=>{photos.push({dataUrl:e.target.result,mimeType:f.type,label:''});renderPhotos();};
    r.readAsDataURL(f);
  });
}
function removePhoto(i){photos.splice(i,1);renderPhotos();}
function renderPhotos(){
  document.getElementById('photos-list').innerHTML=photos.map((p,i)=>`
    <div class="photo-item">
      <div class="photo-item-head">
        <span class="photo-item-num">Photo ${i+1}</span>
        <input class="photo-item-label" placeholder="Légende…" value="${p.label}" oninput="photos[${i}].label=this.value">
        <button class="photo-del" onclick="removePhoto(${i})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg></button>
      </div>
      <img class="photo-preview-img" src="${p.dataUrl}">
    </div>`).join('');
}

// Stockage des données de signature en mémoire (évite l'effacement au scroll/resize)
const sigData = {};

function initSig(id){
  const canvas = document.getElementById(id);
  sigData[id] = null; // aucune signature au départ

  // Initialiser la taille une seule fois (pas de listener resize qui efface)
  function setSize(){
    const w = canvas.offsetWidth || 300;
    if(canvas.width !== w){
      const saved = sigData[id];
      canvas.width = w;
      canvas.height = 150;
      // Restaurer si une signature existait
      if(saved){ const img=new Image(); img.onload=()=>canvas.getContext('2d').drawImage(img,0,0); img.src=saved; }
    }
  }
  setSize();
  // Réinitialiser proprement au premier affichage (quand le canvas devient visible)
  setTimeout(setSize, 100);

  const ctx = canvas.getContext('2d');
  let drawing = false;

  function pos(e){
    const r=canvas.getBoundingClientRect(),s=e.touches?e.touches[0]:e;
    return {x:(s.clientX-r.left)*canvas.width/r.width, y:(s.clientY-r.top)*canvas.height/r.height};
  }
  function down(e){
    e.preventDefault(); e.stopPropagation();
    drawing=true; const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y);
  }
  function move(e){
    e.preventDefault(); e.stopPropagation();
    if(!drawing) return;
    const p=pos(e); ctx.lineTo(p.x,p.y);
    ctx.strokeStyle='#141210'; ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.stroke();
  }
  function up(e){
    e.preventDefault(); e.stopPropagation();
    drawing=false; ctx.closePath();
    // Sauvegarder en mémoire après chaque trait
    sigData[id] = canvas.toDataURL('image/png');
  }
  canvas.addEventListener('mousedown',down,{passive:false});
  canvas.addEventListener('mousemove',move,{passive:false});
  canvas.addEventListener('mouseup',up,{passive:false});
  canvas.addEventListener('touchstart',down,{passive:false});
  canvas.addEventListener('touchmove',move,{passive:false});
  canvas.addEventListener('touchend',up,{passive:false});
}

function clearSig(id){
  const c=document.getElementById(id);
  c.getContext('2d').clearRect(0,0,c.width,c.height);
  sigData[id]=null;
}

function getSigDataUrl(id){
  // Retourner la version sauvegardée en mémoire si disponible
  return sigData[id] || document.getElementById(id).toDataURL('image/png');
}

function openPreview(){buildPdf();document.getElementById('pdfModal').classList.add('open');}

function buildPdf(){
  const chantier    =document.getElementById('meta-chantier').value||'—';
  const date        =document.getElementById('meta-date').value||'—';
  const heure       =document.getElementById('meta-heure').value||'—';
  const intervenant =document.getElementById('meta-intervenant').value||'—';
  const description =document.getElementById('meta-description').value||'';
  const solde       =soldeVal||'—';
  const sigLoue     =getSigDataUrl('sig-loue');
  const sigInt      =getSigDataUrl('sig-intervenant');

  const soldeColor=solde==='OUI'?'#196B3B':solde==='NON'?'#B32E2E':'#6A6460';
  const soldeBg=solde==='OUI'?'#E1F2E9':solde==='NON'?'#FAE8E8':'#F2F0EC';

  const sigsHtml = `
    <table style="width:100%;border-collapse:collapse;margin-top:14px">
      <tr>
        <td style="width:50%;padding-right:8px;vertical-align:top">
          <div style="font-size:9px;font-weight:700;text-transform:uppercase;color:#6A6460;margin-bottom:4px">Signature Entreprise Loué</div>
          <div style="border:1px solid #D8D4CE;border-radius:4px;height:80px;display:flex;align-items:center;justify-content:center;background:#FAFAF8">
            <img src="${sigLoue}" style="max-width:100%;max-height:76px;">
          </div>
        </td>
        <td style="width:50%;padding-left:8px;vertical-align:top">
          <div style="font-size:9px;font-weight:700;text-transform:uppercase;color:#6A6460;margin-bottom:4px">Signature Client</div>
          <div style="border:1px solid #D8D4CE;border-radius:4px;height:80px;display:flex;align-items:center;justify-content:center;background:#FAFAF8">
            <img src="${sigInt}" style="max-width:100%;max-height:76px;">
          </div>
        </td>
      </tr>
    </table>`;

  let photosHtml = '';
  if(photos.length===1){
    photosHtml=`<div style="margin-top:10px;border:1px solid #D8D4CE;border-radius:5px;overflow:hidden">
      <div style="background:#E1F2E9;padding:5px 10px;border-bottom:1px solid #196B3B;font-size:9px;font-weight:700;color:#196B3B">Photo</div>
      <div style="padding:8px;text-align:center"><img src="${photos[0].dataUrl}" style="max-width:100%;max-height:100mm;display:block;margin:0 auto;"></div>
    </div>`;
  } else if(photos.length>=2){
    for(let i=0;i<photos.length;i+=2){
      const p1=photos[i],p2=photos[i+1];
      photosHtml+=`<div style="page-break-before:always;padding:10px">
        <table style="width:100%;border-collapse:collapse"><tr>
          <td style="width:50%;padding-right:6px;text-align:center"><img src="${p1.dataUrl}" style="max-width:100%;max-height:110mm;display:block;margin:0 auto;"></td>
          ${p2?`<td style="width:50%;padding-left:6px;text-align:center"><img src="${p2.dataUrl}" style="max-width:100%;max-height:110mm;display:block;margin:0 auto;"></td>`:'<td></td>'}
        </tr></table>
        ${i+2>=photos.length?sigsHtml:''}
      </div>`;
    }
  }
  const sigsAfter = photos.length<=1 ? sigsHtml : '';

  document.getElementById('pdfContent').innerHTML=`
    <div style="border-bottom:3px solid #196B3B;padding-bottom:10px;margin-bottom:12px;">
      <table style="width:100%;border-collapse:collapse"><tr>
        <td style="vertical-align:middle"><div style="font-weight:800;font-size:16px;color:#1A2B4A">Loué Menuiserie</div><div style="font-size:9px;color:#6A6460">Menuiserie · Charpente · Agencement</div></td>
        <td style="text-align:right;vertical-align:middle"><div style="font-weight:800;font-size:14px;color:#196B3B">QUITUS</div><div style="font-size:11px;color:#6A6460;margin-top:3px">Chantier : <b>${chantier}</b> — Le ${date} à ${heure}</div></td>
      </tr></table>
    </div>
    <div style="padding:10px 12px;background:#E1F2E9;border:1.5px solid #196B3B;border-radius:5px;margin-bottom:10px;font-size:12px"><strong>Intervenant :</strong> ${intervenant}</div>
    ${description?`<div style="padding:10px 12px;background:#F7F5F1;border:1px solid #D8D4CE;border-radius:5px;margin-bottom:10px"><div style="font-size:8px;font-weight:700;text-transform:uppercase;color:#6A6460;margin-bottom:5px">Description Intervention</div><div style="font-size:11px;line-height:1.7;white-space:pre-wrap;word-break:break-word">${description}</div></div>`:''}
    <div style="display:inline-flex;align-items:center;padding:8px 14px;background:${soldeBg};border:1.5px solid ${soldeColor};border-radius:8px;margin-bottom:12px"><span style="font-size:12px;font-weight:700;color:${soldeColor}">SOLDÉ : ${solde}</span></div>
    ${photosHtml}
    ${sigsAfter}`;
}

async function sendDoc(){
  const errors=[];
  const chantierEl=document.getElementById('meta-chantier');
  const interveEl=document.getElementById('meta-intervenant');
  const descEl=document.getElementById('meta-description');
  [chantierEl,interveEl,descEl].forEach(el=>el.classList.remove('error'));
  if(!chantierEl.value.trim()){chantierEl.classList.add('error');errors.push('Chantier manquant');}
  if(!interveEl.value.trim()){interveEl.classList.add('error');errors.push('Intervenant manquant');}
  if(!descEl.value.trim()){descEl.classList.add('error');errors.push('Description manquante');}
  if(!soldeVal){errors.push('Indiquez si soldé OUI ou NON');}
  if(!photos.length){errors.push('Au moins une photo obligatoire');}
  if(errors.length){
    const b=document.getElementById('valBanner');
    document.getElementById('valMsg').textContent=errors.join(' — ');
    b.classList.add('show');setTimeout(()=>b.classList.remove('show'),7000);return;
  }
  document.getElementById('valBanner').classList.remove('show');
  const btn=document.getElementById('btn-envoyer');
  btn.disabled=true;btn.textContent='Envoi…';

  const photosB64=await Promise.all(photos.map(p=>compressPhoto(p)));
  const tousDestinataires=[...new Set([...(MOI.email?[MOI.email]:[]),...destinataires])];

  const payload={
    type:TYPE_DOC,
    chantier:chantierEl.value, date:document.getElementById('meta-date').value,
    heure:document.getElementById('meta-heure').value,
    intervenant:interveEl.value, description:descEl.value,
    solde:soldeVal,
    sigLoue:getSigDataUrl('sig-loue'), sigIntervenant:getSigDataUrl('sig-intervenant'),
    destinataires:tousDestinataires, photosBase64:photosB64,
  };

  try{
    await fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    showToast('✓ Quitus envoyé !');
  }catch(e){showToast('Erreur réseau');}
  finally{
    btn.disabled=false;
    btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg> Envoyer le quitus';
  }
}

async function compressPhoto(p){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=1200;let w=img.naturalWidth,h=img.naturalHeight;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      resolve({data:c.toDataURL('image/jpeg',.72).split(',')[1],mimeType:'image/jpeg',label:p.label||''});
    };
    img.src=p.dataUrl;
  });
}

function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500);}
</script>

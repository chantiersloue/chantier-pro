<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prise de cotes — Placards</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange:#D95818; --orange-l:#F8ECE4; --orange-d:#AA4110;
            --bg:#F2F0EC; --card:#FFF; --text:#141210; --muted:#6A6460;
            --border:#D8D4CE; --border2:#B8B4AE;
            --blue:#1454A0; --blue-l:#DCE8F8; --blue-d:#0D3D7A;
            --green:#196B3B; --green-l:#E1F2E9;
            --header-bg:#1A2B4A;
            --r:8px; --rl:12px;
            --red: #d32f2f;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

        /* ── BARRE DU HAUT ── */
        .topbar{background:var(--header-bg);padding:0 16px;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;}
        .tb-logo{display:flex;align-items:center;gap:9px;}
        .tb-sq{width:26px;height:26px;background:var(--orange);border-radius:5px;display:flex;align-items:center;justify-content:center;}
        .tb-sq svg{width:13px;height:13px;fill:white;}
        .tb-name{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:white;}

        /* ── CONTENU PRINCIPAL ── */
        .main{padding:16px;max-width:1100px;margin:0 auto;}

        /* ── ENTÊTE DE LA FICHE ── */
        .fiche-header{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:16px 20px;margin-bottom:14px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
        .fiche-logo-zone{display:flex;align-items:center;gap:10px;}
        .fiche-logo-box{width:44px;height:44px;background:var(--orange);border-radius:9px;display:flex;align-items:center;justify-content:center;}
        .fiche-logo-box svg{width:22px;height:22px;fill:white;}
        .fiche-co{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;}
        .fiche-co-sub{font-size:10.5px;color:var(--muted);margin-top:1px;}
        .fiche-title-zone{flex:1;text-align:center;}
        .fiche-main-title{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;letter-spacing:.3px;color:var(--header-bg);}
        .fiche-meta-zone{display:flex;flex-direction:column;gap:8px;min-width:240px;}
        .fiche-meta-row{display:flex;align-items:center;gap:8px;}
        .fiche-meta-label{font-size:11px;font-weight:500;color:var(--muted);white-space:nowrap;min-width:70px;}
        .fiche-meta-input{flex:1;padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:var(--bg);outline:none;color:var(--text);}
        .fiche-meta-input:focus{border-color:var(--orange);background:white;}
        .fiche-ref-badge{background:var(--orange-l);color:var(--orange-d);border:1px solid #E8C4A8;border-radius:6px;padding:5px 11px;font-size:11.5px;font-weight:500;white-space:nowrap;}

        /* ── BLOC PLINTHE ── */
        .plinthe-bloc{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:13px 18px;margin-bottom:14px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
        .plinthe-title{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:var(--text);margin-right:4px;}
        .plinthe-cases{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
        .pcase{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:var(--r);border:1.5px solid var(--border);cursor:pointer;transition:.15s;font-size:13px;user-select:none;}
        .pcase.active-gen{border-color:var(--green);background:var(--green-l);}
        .pcase.active-att{border-color:#C8860A;background:#FDF0D6;}
        .plinthe-gen-zone{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--green-l);border:1.5px solid #B8DFC9;border-radius:var(--r);padding:10px 14px;}
        .plinthe-gen-input input{width:90px;padding:7px 10px;border:1.5px solid var(--green);border-radius:6px;font-size:15px;font-weight:700;text-align:center;outline:none;}
        .non-posee-toggle{display:flex;align-items:center;gap:7px;padding:7px 13px;border:1.5px solid #B8DFC9;border-radius:6px;cursor:pointer;background:white;}
        .non-posee-toggle.active{border-color:#C8860A;background:#FDF0D6;}

        /* ── TABLEAU ── */
        .table-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:16px;}
        .cotes-table{width:100%;border-collapse:collapse;min-width:760px;}
        .th-group{padding:7px 10px;font-family:'Syne',sans-serif;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;text-align:center;border-bottom:1px solid var(--border);}
        .cotes-table thead tr:nth-child(2) th{padding:8px 6px;font-size:10.5px;font-weight:500;color:var(--muted);background:var(--bg);border-bottom:2px solid var(--border2);text-align:center;}
        .cotes-table tbody td{border-bottom:1px solid var(--border);padding:4px;vertical-align:middle;}
        .col-sep{border-right:1px solid var(--border2)!important;}
        .ti{width:100%;padding:8px;border:1px solid transparent;border-radius:6px;font-size:14px;background:transparent;outline:none;text-align:center;transition:.15s;}
        .ti:focus{border-color:var(--orange);background:white;}
        .ti-left{text-align:left;}

        /* ── BOUTONS ── */
        .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 15px;border-radius:var(--r);font-size:13.5px;font-weight:500;cursor:pointer;border:none;transition:.15s;}
        .btn-primary{background:var(--orange);color:white;}.btn-primary:hover{background:var(--orange-d);}
        .btn-secondary{background:var(--card);color:var(--text);border:1px solid var(--border);}.btn-secondary:hover{background:var(--bg);}
        .add-row-btn{display:flex;align-items:center;gap:8px;padding:12px 16px;color:var(--orange);cursor:pointer;font-size:13.5px;font-weight:500;background:transparent;width:100%;border:none;border-top:1px solid var(--border);}

        /* ── ZONE D'ENVOI ── */
        .send-zone{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
        .stag-default{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;font-size:12px;font-weight:500;background:var(--header-bg);color:white;}

        /* ── TOAST ── */
        .toast{position:fixed;bottom:16px;right:16px;background:var(--text);color:white;padding:11px 15px;border-radius:var(--r);font-size:13px;z-index:300;display:flex;align-items:center;gap:9px;transform:translateY(70px);opacity:0;transition:.25s;}
        .toast.show{transform:translateY(0);opacity:1;}

        /* ── MODALE APERÇU ── */
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;}
        .modal-overlay.open{display:flex;}
        .modal{background:white;border-radius:var(--rl);width:100%;max-width:900px;padding:25px;margin-top:20px;}

        /* Éléments UI */
        .sf-toggle{display:flex;gap:4px;justify-content:center;}
        .sf-btn{padding:5px 9px;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--bg);}
        .sf-btn.active-f{background:var(--blue-l);color:var(--blue-d);border-color:var(--blue);}
        .sf-btn.active-c{background:#FDF0D6;color:#7A4200;border-color:#C8860A;}
        .required-star{color:var(--red);font-size:10px;vertical-align:super;}
    </style>
</head>
<body>

<div class="topbar">
    <div class="tb-logo">
        <div class="tb-sq"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
        <div class="tb-name">ChantierPro</div>
    </div>
    <button class="btn btn-secondary" style="padding:6px 12px; font-size:12px;" onclick="openPreview()">Aperçu</button>
</div>

<div class="main">
    <div class="fiche-header">
        <div class="fiche-logo-zone">
            <div class="fiche-logo-box"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
            <div><div class="fiche-co">Loué Menuiserie</div><div class="fiche-co-sub">Menuiserie · Agencement</div></div>
        </div>
        <div class="fiche-title-zone">
            <div class="fiche-main-title">PRISE DE COTES — PLACARDS</div>
        </div>
        <div class="fiche-meta-zone">
            <div class="fiche-meta-row">
                <span class="fiche-meta-label">Chantier <span class="required-star">*</span></span>
                <input class="fiche-meta-input" id="meta-chantier" placeholder="Choisir un chantier..." 
                       list="chantiers-list" autocomplete="off" onclick="this.select()" onfocus="this.select()">
                <datalist id="chantiers-list"></datalist>
            </div>
            <div class="fiche-meta-row">
                <span class="fiche-meta-label">Bâtiment</span>
                <input class="fiche-meta-input" id="meta-batiment" placeholder="Ex: Bât A">
            </div>
            <div class="fiche-meta-row">
                <span class="fiche-meta-label">Rédigé par <span class="required-star">*</span></span>
                <input class="fiche-meta-input" id="meta-auteur" placeholder="Votre nom..." 
                       list="auteurs-list" autocomplete="off" onclick="this.select()" onfocus="this.select()">
                <datalist id="auteurs-list"></datalist>
            </div>
            <div class="fiche-meta-row">
                <span class="fiche-meta-label">Date</span>
                <input type="text" class="fiche-meta-input" id="meta-date" readonly>
            </div>
        </div>
        <div class="fiche-ref-badge" id="fiche-ref">PC-2026-001</div>
    </div>

    <div class="plinthe-bloc">
        <div class="plinthe-title">Hauteur de plinthe</div>
        <div class="plinthe-cases">
            <div class="pcase" id="pcase-gen" onclick="selectPlintheMode('gen')">Généralité</div>
            <div class="pcase" id="pcase-att" onclick="selectPlintheMode('att')">Variables</div>
        </div>
        <div class="plinthe-gen-zone" id="plinthe-gen-zone" style="display:none">
            <input type="number" id="plinthe-gen-val" placeholder="100" oninput="updatePlinthGen()">
            <span>mm</span>
            <div class="non-posee-toggle" id="non-posee-toggle" onclick="toggleNonPosee()">Non posée</div>
        </div>
    </div>

    <div class="table-wrap">
        <div style="overflow-x:auto">
            <table class="cotes-table">
                <thead>
                    <tr>
                        <th class="th-group" rowspan="2" style="text-align:left;padding-left:12px">Logement / Pièce</th>
                        <th class="th-group" colspan="4">FAÇADE</th>
                        <th class="th-group" colspan="2">AMÉNAGEMENT</th>
                        <th class="th-group" id="th-plinthe-group" rowspan="2" style="display:none">Plinthe</th>
                        <th class="th-group" rowspan="2"></th>
                    </tr>
                    <tr>
                        <th class="col-sep">Haut.</th>
                        <th>F/C</th>
                        <th>Mur/Mur</th>
                        <th class="col-sep">Pl/Pl</th>
                        <th>Long.</th>
                        <th class="col-sep">Prof.</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        <button class="add-row-btn" onclick="addRow()">+ Ajouter une ligne</button>
    </div>

    <div class="send-zone">
        <div class="send-info">
            <div class="send-title">Diffusion</div>
            <div id="send-targets-list"></div>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-secondary" onclick="openPreview()">Aperçu PDF</button>
            <button class="btn btn-primary" id="btn-envoyer" onclick="sendDoc()">Envoyer au conducteur</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="pdfModal">
    <div class="modal">
        <div id="pdfContent"></div>
        <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:20px;border-top:1px solid #eee;padding-top:15px;">
            <button class="btn btn-secondary" onclick="closePreview()">Fermer</button>
            <button class="btn btn-primary" onclick="sendDoc();closePreview()">Confirmer l'envoi</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"><span id="toastMsg">OK</span></div>

<script>
// CONFIGURATION
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwFT3LiXCkCQlQl47V8W2HGkEoaC3kUUhNe_UshgTlBhD_6cI25qIIsrfAyRCfxOxyyCA/exec';

let rows = [];
let rowCounter = 0;
let plinthMode = '';
let plinthNonPosee = false;
let CONDUCTEUR_DEFAUT = { name:'Chargement...' };
let ALL_USERS = [];

// CHARGEMENT DES DONNÉES DEPUIS LE SHEET
function loadContacts() {
    const script = document.createElement('script');
    window._contactsCallback = function(data) {
        if(data && data.contacts) {
            ALL_USERS = data.contacts.map((c, i) => ({
                id: i + 1,
                name: c.nom,
                default: String(c.conducteurDefaut).toUpperCase() === 'O'
            }));
            
            const cond = ALL_USERS.find(u => u.default);
            if(cond) CONDUCTEUR_DEFAUT = cond;

            // Chantiers
            const dlC = document.getElementById('chantiers-list');
            dlC.innerHTML = '';
            (data.chantiers || []).forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.reference ? `${c.nom} — ${c.reference}` : c.nom;
                dlC.appendChild(opt);
            });

            // Auteurs (Datalist)
            const dlA = document.getElementById('auteurs-list');
            dlA.innerHTML = '';
            ALL_USERS.forEach(u => {
                const opt = document.createElement('option');
                opt.value = u.name;
                dlA.appendChild(opt);
            });

            renderSendTargets();
        }
        delete window._contactsCallback;
        script.remove();
    };
    script.src = APPS_SCRIPT_URL + '?action=getContacts&callback=_contactsCallback&t=' + Date.now();
    document.head.appendChild(script);
}

// GESTION PLINTHES
function selectPlintheMode(mode) {
    plinthMode = plinthMode === mode ? '' : mode;
    document.getElementById('pcase-gen').className = 'pcase' + (plinthMode==='gen' ? ' active-gen' : '');
    document.getElementById('pcase-att').className = 'pcase' + (plinthMode==='att' ? ' active-att' : '');
    document.getElementById('plinthe-gen-zone').style.display = plinthMode==='gen' ? 'flex' : 'none';
    document.getElementById('th-plinthe-group').style.display = plinthMode==='att' ? '' : 'none';
    renderTable();
}

function updatePlinthGen() {
    const val = document.getElementById('plinthe-gen-val').value;
    rows.forEach(r => r.plinthe = val);
}

function toggleNonPosee() {
    plinthNonPosee = !plinthNonPosee;
    document.getElementById('non-posee-toggle').classList.toggle('active', plinthNonPosee);
    rows.forEach(r => r.plinthe = plinthNonPosee ? 'Non posée' : '');
}

// GESTION LIGNES
function addRow() {
    rowCounter++;
    rows.push({ id: rowCounter, logt:'', piece:'', hauteur:'', solType:'', murHaut:'', plintheBas:'', long:'', prof:'', plinthe:'' });
    renderTable();
}

function renderTable() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = rows.map((r, i) => `
        <tr>
            <td class="col-sep">
                <input class="ti ti-left" style="font-weight:700" placeholder="Logt" value="${r.logt}" oninput="updateRow(${r.id},'logt',this.value)">
                <input class="ti ti-left" style="font-size:11px" placeholder="Pièce" value="${r.piece}" oninput="updateRow(${r.id},'piece',this.value)">
            </td>
            <td><input class="ti" type="number" value="${r.hauteur}" oninput="updateRow(${r.id},'hauteur',this.value)"></td>
            <td><div class="sf-toggle">
                <button class="sf-btn${r.solType==='F'?' active-f':''}" onclick="setSolType(${r.id},'F')">F</button>
                <button class="sf-btn${r.solType==='C'?' active-c':''}" onclick="setSolType(${r.id},'C')">C</button>
            </div></td>
            <td><input class="ti" type="number" value="${r.murHaut}" oninput="updateRow(${r.id},'murHaut',this.value)"></td>
            <td class="col-sep"><input class="ti" type="number" value="${r.plintheBas}" oninput="updateRow(${r.id},'plintheBas',this.value)"></td>
            <td><input class="ti" type="number" value="${r.long}" oninput="updateRow(${r.id},'long',this.value)"></td>
            <td class="col-sep"><input class="ti" type="number" value="${r.prof}" oninput="updateRow(${r.id},'prof',this.value)"></td>
            ${plinthMode==='att' ? `<td><input class="ti" value="${r.plinthe}" oninput="updateRow(${r.id},'plinthe',this.value)"></td>` : ''}
            <td style="text-align:center"><button style="background:none;border:none;cursor:pointer;color:#ccc" onclick="deleteRow(${r.id})">×</button></td>
        </tr>
    `).join('');
}

function updateRow(id, f, v) { const r = rows.find(x=>x.id===id); if(r) r[f]=v; }
function setSolType(id, t) { const r = rows.find(x=>x.id===id); if(r) r.solType=(r.solType===t?'':t); renderTable(); }
function deleteRow(id) { rows = rows.filter(x=>x.id!==id); renderTable(); }

function renderSendTargets() {
    document.getElementById('send-targets-list').innerHTML = `<div class="stag stag-default">${CONDUCTEUR_DEFAUT.name} (Conducteur)</div>`;
}

// GESTION APERÇU PDF
function openPreview() {
    buildPdf();
    document.getElementById('pdfModal').classList.add('open');
}
function closePreview() {
    document.getElementById('pdfModal').classList.remove('open');
}

function buildPdf() {
    const content = document.getElementById('pdfContent');
    const chantier = document.getElementById('meta-chantier').value || '—';
    const batiment = document.getElementById('meta-batiment').value ? '(' + document.getElementById('meta-batiment').value + ')' : '';
    const auteur = document.getElementById('meta-auteur').value || '—';
    const date = document.getElementById('meta-date').value || '—';

    let tableRows = rows.map(r => `
        <tr style="border-bottom:1px solid #eee;">
            <td style="padding:10px; font-weight:bold;">${r.logt || '-'}</td>
            <td style="padding:10px;">${r.piece || '-'}</td>
            <td style="padding:10px; text-align:center;">${r.hauteur || '-'}</td>
            <td style="padding:10px; text-align:center;">${r.solType || '-'}</td>
            <td style="padding:10px; text-align:center;">${r.murHaut || '-'}</td>
            <td style="padding:10px; text-align:center;">${r.long || '-'}</td>
            <td style="padding:10px; text-align:center;">${r.plinthe || '-'}</td>
        </tr>
    `).join('');

    content.innerHTML = `
        <div style="font-family:sans-serif; color:#333;">
            <div style="display:flex; justify-content:space-between; border-bottom:3px solid #1A2B4A; padding-bottom:15px; margin-bottom:20px;">
                <div>
                    <h2 style="margin:0; color:#1A2B4A; font-family:Syne;">Loué Menuiserie</h2>
                    <p style="margin:2px 0; font-size:12px; color:#666;">Fiche de prise de cotes placards</p>
                </div>
                <div style="text-align:right;">
                    <p style="margin:0; font-weight:bold; font-size:16px;">${chantier} ${batiment}</p>
                    <p style="margin:2px 0; font-size:12px;">Date: ${date}</p>
                    <p style="margin:2px 0; font-size:12px; font-weight:bold;">Rédigé par: ${auteur}</p>
                </div>
            </div>

            <table style="width:100%; border-collapse:collapse; font-size:12px;">
                <thead>
                    <tr style="background:#1A2B4A; color:white;">
                        <th style="padding:12px; text-align:left;">Logement</th>
                        <th style="padding:12px; text-align:left;">Pièce</th>
                        <th style="padding:12px;">Hauteur</th>
                        <th style="padding:12px;">F/C</th>
                        <th style="padding:12px;">Mur/Mur</th>
                        <th style="padding:12px;">Longueur</th>
                        <th style="padding:12px;">Plinthe</th>
                    </tr>
                </thead>
                <tbody>
                    ${tableRows || '<tr><td colspan="7" style="text-align:center; padding:30px; color:#999;">Aucune donnée saisie</td></tr>'}
                </tbody>
            </table>

            <div style="margin-top:40px; display:flex; justify-content:space-between; font-size:11px; color:#666;">
                <div style="border:1px dashed #ccc; padding:15px; width:45%; border-radius:5px; height:60px;">Signature Client / Chef de chantier</div>
                <div style="border:1px dashed #ccc; padding:15px; width:45%; border-radius:5px; height:60px;">Visa Bureau d'Études</div>
            </div>
        </div>
    `;
}

// ENVOI DES DONNÉES
async function sendDoc() {
    if(!rows.length) return showToast('Veuillez ajouter des lignes au tableau');
    const btn = document.getElementById('btn-envoyer');
    btn.disabled = true; btn.textContent = 'Envoi en cours...';

    const payload = {
        ref: document.getElementById('fiche-ref').textContent,
        chantier: document.getElementById('meta-chantier').value,
        batiment: document.getElementById('meta-batiment').value,
        auteur: document.getElementById('meta-auteur').value,
        date: document.getElementById('meta-date').value,
        lignes: rows
    };

    try {
        await fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        showToast('✓ Fiche transmise et PDF généré !');
    } catch(e) {
        showToast('Erreur d\'envoi');
    } finally {
        btn.disabled = false; btn.textContent = 'Envoyer au conducteur';
    }
}

function showToast(m) {
    const t = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = m;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
}

// INITIALISATION
(function() {
    document.getElementById('meta-date').value = new Date().toLocaleDateString('fr-FR');

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Loué App</title>
<link rel="icon" type="image/png" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Loué App">
<meta name="theme-color" content="#1A2B4A">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --orange:#D95818;--orange-l:#F8ECE4;
  --bg:#F2F0EC;--card:#FFF;--text:#141210;--muted:#6A6460;
  --border:#D8D4CE;--border2:#B8B4AE;
  --blue:#1454A0;--blue-l:#DCE8F8;--blue-d:#0D3D7A;
  --green:#196B3B;--green-l:#E1F2E9;
  --purple:#6B3FA0;--purple-l:#EDE8F8;
  --amber:#9A5600;--amber-l:#FDF0D8;
  --header-bg:#1A2B4A;
  --r:10px;--rl:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

/* TOPBAR */
.topbar{background:var(--header-bg);padding:0 18px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:30;flex-shrink:0;}
.tb-sq{width:30px;height:30px;background:var(--orange);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tb-sq svg{width:15px;height:15px;fill:white;}
.tb-name{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:white;}
.tb-company{margin-left:auto;font-size:11px;color:rgba(255,255,255,.4);}

/* PAGES */
.page{display:none;flex:1;flex-direction:column;min-height:calc(100vh - 56px);}
.page.active{display:flex;}

/* PAGE ACCUEIL */
.home-content{padding:24px 16px 40px;flex:1;}
.home-label{font-family:'Syne',sans-serif;font-weight:700;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;}
.home-tiles{display:flex;flex-direction:column;gap:14px;}
.home-tile{background:var(--card);border-radius:var(--rl);padding:22px 20px;cursor:pointer;transition:.18s;display:flex;align-items:center;gap:18px;min-height:90px;border:1.5px solid var(--border);}
.home-tile:active{transform:scale(.98);opacity:.9;}
.tile-icon{width:56px;height:56px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tile-icon svg{width:28px;height:28px;}
.tile-body{flex:1;}
.tile-title{font-family:'Syne',sans-serif;font-weight:700;font-size:17px;color:var(--text);margin-bottom:4px;}
.tile-sub{font-size:12.5px;color:var(--muted);line-height:1.4;}
.tile-arrow{color:var(--border2);flex-shrink:0;}
.tile-arrow svg{width:18px;height:18px;}

/* PAGE INTÉRIEURE */
.page-header{background:var(--header-bg);padding:0 16px;height:50px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.page-back{width:32px;height:32px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:white;}
.page-back svg{width:16px;height:16px;}
.page-title{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:white;}
.page-body{padding:16px;flex:1;}

/* FICHES */
.fiches-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:380px){.fiches-grid{grid-template-columns:1fr;}}
.fiche-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--rl);padding:22px 16px 30px;text-decoration:none;display:flex;flex-direction:column;gap:12px;position:relative;transition:.18s;}
.fiche-card:active{transform:scale(.97);}
.fiche-icon{width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;}
.fiche-icon svg{width:26px;height:26px;}
.fiche-title{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:var(--text);}
.fiche-sub{font-size:11.5px;color:var(--muted);line-height:1.5;}
.fiche-arrow{position:absolute;bottom:14px;right:14px;color:var(--border2);}
.fiche-arrow svg{width:15px;height:15px;}

/* CHANTIERS */
.list-wrap{display:flex;flex-direction:column;gap:10px;}
.chantier-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:.15s;}
.chantier-card:active{background:#F0F5FF;}
.ch-num{width:40px;height:40px;border-radius:10px;background:var(--blue-l);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:var(--blue);flex-shrink:0;}
.ch-name{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:var(--text);}
.ch-ref{font-size:11.5px;color:var(--muted);margin-top:2px;}
.ch-arrow{margin-left:auto;color:var(--border2);}
.ch-arrow svg{width:16px;height:16px;}
.ch-statut{padding:2px 9px;border-radius:10px;font-size:10.5px;font-weight:600;margin-right:4px;}
.s-cours{background:#E1F2E9;color:var(--green);}
.s-fin{background:var(--bg);color:var(--muted);}

/* ÉTATS */
.empty{padding:50px 20px;text-align:center;color:var(--muted);}
.empty svg{width:44px;height:44px;color:var(--border);display:block;margin:0 auto 14px;}
.empty-t{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;margin-bottom:8px;}
.empty-s{font-size:13px;line-height:1.6;}
.loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:40px;color:var(--muted);font-size:13px;}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(20,18,16,.55);z-index:100;display:flex;flex-direction:column;justify-content:flex-end;opacity:0;pointer-events:none;transition:.25s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal-sheet{background:var(--card);border-radius:20px 20px 0 0;transform:translateY(100%);transition:.25s;max-height:88vh;display:flex;flex-direction:column;}
.modal-overlay.open .modal-sheet{transform:translateY(0);}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:14px auto 0;}
.modal-head{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.modal-title{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.modal-close{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.modal-close svg{width:13px;height:13px;}
.modal-body{display:flex;flex-direction:column;overflow:hidden;flex:1;}
/* Sous-onglets scrollables horizontalement */
.onglets-scroll{overflow-x:auto;padding:12px 16px 0;border-bottom:1px solid var(--border);-webkit-overflow-scrolling:touch;}
.onglets-scroll::-webkit-scrollbar{display:none;}
.onglets-inner{display:inline-flex;gap:6px;padding-bottom:12px;}
.sOnglet{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);font-size:12px;font-weight:500;cursor:pointer;background:var(--bg);color:var(--muted);white-space:nowrap;flex-shrink:0;transition:.15s;}
.sOnglet.active{background:var(--blue-l);color:var(--blue-d);border-color:var(--blue);}
/* Liste docs */
.docs-scroll{overflow-y:auto;flex:1;padding:14px 16px;}
.doc-list{display:flex;flex-direction:column;gap:8px;}
.doc-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);text-decoration:none;transition:.15s;}
.doc-item:active{background:#EEF3FF;border-color:var(--blue);}
.doc-ic{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.doc-ic svg{width:17px;height:17px;}
.doc-info{flex:1;min-width:0;}
.doc-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.doc-meta{font-size:11px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:6px;}
.doc-badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;}
.doc-ext{flex-shrink:0;color:var(--border2);}
.docs-empty{padding:30px;text-align:center;color:var(--muted);font-size:13px;line-height:1.7;}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:#141210;color:white;padding:11px 18px;border-radius:var(--r);font-size:13px;z-index:400;opacity:0;transition:.25s;white-space:nowrap;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
</style>
</head>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw4iyVmaDgXTrq-yO-QArwhWbY57Ny0U8hCHcUq45Mxi7ZwheCFOQpfOAoX0oSD3QaUFQ/exec';
let ALL_CHANTIERS = [];
let currentChantier = null;
let currentSousOnglet = 'acces';

// ── Navigation ──
function showPage(p) {
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  window.scrollTo(0,0);
  if(p==='chantiers') loadChantiers();
  if(p==='planning')  loadPlanning();
}

// ── Chantiers ──
function loadChantiers() {
  const el = document.getElementById('chantiers-container');
  if(ALL_CHANTIERS.length){ renderChantiers(); return; }
  el.innerHTML='<div class="loading"><div class="spinner"></div>Chargement…</div>';
  if(!APPS_SCRIPT_URL){ renderChantiersFallback(); return; }
  window._homeCB = function(data) {
    clearTimeout(window._homeTO);
    if(data && data.chantiers && data.chantiers.length) {
      ALL_CHANTIERS = data.chantiers.map((c,i)=>({id:i+1,nom:c.nom,reference:c.reference||'',statut:c.statut||''}));
      renderChantiers();
    } else renderChantiersFallback();
    delete window._homeCB; delete window._homeTO;
    const s=document.getElementById('_jsonp_home'); if(s) s.remove();
  };
  window._homeTO = setTimeout(()=>{ if(window._homeCB){delete window._homeCB; renderChantiersFallback();} },10000);
  const sc=document.createElement('script'); sc.id='_jsonp_home';
  sc.src=APPS_SCRIPT_URL+'?action=getContacts&callback=_homeCB&t='+Date.now();
  document.head.appendChild(sc);
}

function renderChantiers() {
  const el=document.getElementById('chantiers-container');
  if(!ALL_CHANTIERS.length){ el.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg><div class="empty-t">Aucun chantier</div><div class="empty-s">Ajoutez des chantiers dans l'onglet Chantiers du Sheet</div></div>`; return; }
  el.innerHTML=`<div class="list-wrap">${ALL_CHANTIERS.map((c,i)=>`
    <div class="chantier-card" onclick="openChantier(${c.id})">
      <div class="ch-num">${String(i+1).padStart(2,'0')}</div>
      <div style="flex:1;min-width:0"><div class="ch-name">${c.nom}</div>${c.reference?`<div class="ch-ref">Réf. ${c.reference}</div>`:''}</div>
      ${c.statut?`<span class="ch-statut ${c.statut==='En cours'?'s-cours':'s-fin'}">${c.statut}</span>`:''}
      <div class="ch-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
    </div>`).join('')}</div>`;
}

function renderChantiersFallback() {
  document.getElementById('chantiers-container').innerHTML=`<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg><div class="empty-t">Impossible de charger</div><div class="empty-s">Vérifiez la connexion.</div></div>`;
}

// ── Planning ──
let planningCharge = false;
function loadPlanning() {
  if(planningCharge) return;
  const el=document.getElementById('planning-container');
  el.innerHTML='<div class="loading"><div class="spinner"></div>Chargement…</div>';
  if(!APPS_SCRIPT_URL){ renderPlanningVide(); return; }
  window._planningCB = function(data) {
    clearTimeout(window._planningTO);
    planningCharge = true;
    const docs = (data && data.dossiers && data.dossiers.planning) || [];
    renderPlanningDocs(docs);
    delete window._planningCB; delete window._planningTO;
    const s=document.getElementById('_jsonp_planning'); if(s) s.remove();
  };
  window._planningTO = setTimeout(()=>{ if(window._planningCB){delete window._planningCB; renderPlanningVide();} },10000);
  const sc=document.createElement('script'); sc.id='_jsonp_planning';
  sc.src=APPS_SCRIPT_URL+'?action=getDossiers&chantier=__PLANNING__&callback=_planningCB&t='+Date.now();
  document.head.appendChild(sc);
}

function renderPlanningDocs(docs) {
  const el=document.getElementById('planning-container');
  if(!docs.length){ renderPlanningVide(); return; }
  el.innerHTML=`<div class="list-wrap">${docs.map(d=>docHTML(d)).join('')}</div>`;
}
function renderPlanningVide() {
  document.getElementById('planning-container').innerHTML=`<div class="empty">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
    <div class="empty-t">Aucun planning</div>
    <div class="empty-s">Déposez les PDFs dans le dossier<br><strong>Planning</strong> à la racine de votre Drive Loué Menuiserie.</div>
  </div>`;
}

// ── Modal chantier ──
function openChantier(id) {
  currentChantier = ALL_CHANTIERS.find(c=>c.id===id); if(!currentChantier) return;
  document.getElementById('modal-chantier-name').textContent = currentChantier.nom;
  document.getElementById('modal-chantier-ref').textContent  = currentChantier.reference?'Réf. '+currentChantier.reference:'';
  currentSousOnglet='acces';
  document.querySelectorAll('.sOnglet').forEach((el,i)=>el.classList.toggle('active',i===0));
  document.getElementById('docs-container').innerHTML='<div class="loading"><div class="spinner"></div>Chargement…</div>';
  document.getElementById('chantierModal').classList.add('open');
  document.body.style.overflow='hidden';
  chargerDossiers(currentChantier.nom);
}
function closeModal() {
  document.getElementById('chantierModal').classList.remove('open');
  document.body.style.overflow='';
}
document.getElementById('chantierModal').addEventListener('click',e=>{if(e.target===document.getElementById('chantierModal'))closeModal();});

function chargerDossiers(nom) {
  if(currentChantier.dossiers){ renderDocs(currentSousOnglet); return; }
  window._dossCB = function(data) {
    clearTimeout(window._dossTO);
    currentChantier.dossiers = (data&&data.dossiers)?data.dossiers:{};
    renderDocs(currentSousOnglet);
    delete window._dossCB; delete window._dossTO;
    const s=document.getElementById('_jsonp_doss'); if(s) s.remove();
  };
  window._dossTO = setTimeout(()=>{
    if(window._dossCB){ delete window._dossCB; currentChantier.dossiers={};
      document.getElementById('docs-container').innerHTML='<div class="docs-empty">Impossible de charger.<br><span style="font-size:11px">Vérifiez la connexion.</span></div>';
    }
  },12000);
  const sc=document.createElement('script'); sc.id='_jsonp_doss';
  sc.src=APPS_SCRIPT_URL+'?action=getDossiers&chantier='+encodeURIComponent(nom)+'&callback=_dossCB&t='+Date.now();
  document.head.appendChild(sc);
}

function showSousOnglet(onglet, btn) {
  currentSousOnglet=onglet;
  document.querySelectorAll('.sOnglet').forEach(el=>el.classList.remove('active'));
  btn.classList.add('active');
  renderDocs(onglet);
}

function renderDocs(onglet) {
  const el=document.getElementById('docs-container');
  if(!currentChantier.dossiers){ el.innerHTML='<div class="loading"><div class="spinner"></div>Chargement…</div>'; return; }
  const docs = currentChantier.dossiers[onglet]||[];
  if(!docs.length){ el.innerHTML='<div class="docs-empty">Aucun document dans ce dossier.<br><span style="font-size:11px">Déposez des fichiers dans le dossier Drive correspondant.</span></div>'; return; }
  el.innerHTML = docs.map(d=>docHTML(d)).join('');
}

// ── Rendu d'un doc ──
function docHTML(d) {
  const T = {
    pdf  : {bg:'#FAE8E8',   clr:'#B32E2E', badge:'badge-pdf',  label:'PDF'},
    image: {bg:'#EDE8F8',   clr:'#6B3FA0', badge:'badge-img',  label:'IMG'},
    xls  : {bg:'#E1F2E9',   clr:'#196B3B', badge:'badge-xls',  label:'XLS'},
    ppt  : {bg:'#FDF0D8',   clr:'#9A5600', badge:'badge-ppt',  label:'PPT'},
    doc  : {bg:'#DCE8F8',   clr:'#1454A0', badge:'badge-doc',  label:'DOC'},
  };
  const t = T[d.type||'']||{bg:'#F2F0EC',clr:'#6A6460',badge:'',label:''};
  const PATH = '<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>';
  return `<a class="doc-item" href="${d.url||'#'}" target="_blank" rel="noopener">
    <div class="doc-ic" style="background:${t.bg}">
      <svg viewBox="0 0 24 24" fill="none" stroke="${t.clr}" stroke-width="2">${PATH}</svg>
    </div>
    <div class="doc-info">
      <div class="doc-name">${d.nom||'Document'}</div>
      <div class="doc-meta">
        ${t.label?`<span style="background:${t.bg};color:${t.clr};padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700">${t.label}</span>`:''}
        <span>${d.date||''}</span>
      </div>
    </div>
    <svg class="doc-ext" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
  </a>`;
}

function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
</script>

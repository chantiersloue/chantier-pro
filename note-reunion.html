<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Loué App — Note de réunion</title>
<link rel="icon" type="image/png" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Note Réunion">
<meta name="theme-color" content="#1A2B4A">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--orange:#D95818;--orange-l:#F8ECE4;--orange-d:#AA4110;--bg:#F2F0EC;--card:#FFF;--text:#141210;--muted:#6A6460;--border:#D8D4CE;--border2:#B8B4AE;--blue:#1454A0;--blue-l:#DCE8F8;--blue-d:#0D3D7A;--green:#196B3B;--green-l:#E1F2E9;--amber:#9A5600;--amber-l:#FDF0D8;--red:#B32E2E;--red-l:#FAE8E8;--purple:#6B3FA0;--purple-l:#EDE8F8;--teal:#0D7A6B;--teal-l:#E0F5F2;--header-bg:#1A2B4A;--r:8px;--rl:12px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* TOPBAR */
.topbar{background:var(--header-bg);padding:0 16px;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;}
.tb-logo{display:flex;align-items:center;gap:9px;}
.tb-sq{width:26px;height:26px;background:var(--teal);border-radius:5px;display:flex;align-items:center;justify-content:center;}
.tb-sq svg{width:13px;height:13px;stroke:white;fill:none;}
.tb-name{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:white;}
.tb-badge{background:var(--teal);color:white;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;}
.tb-right{display:flex;gap:8px;}
.main{padding:16px;max-width:860px;margin:0 auto;padding-bottom:100px;}

/* HEADER FICHE */
.fiche-header{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:16px 20px;margin-bottom:14px;}
.fiche-title-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.fiche-logo-box{width:42px;height:42px;background:var(--teal);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.fiche-logo-box svg{width:21px;height:21px;stroke:white;fill:none;}
.fiche-main-title{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:var(--header-bg);}
.fiche-main-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:500px){.meta-grid{grid-template-columns:1fr;}}
.meta-field{display:flex;flex-direction:column;gap:4px;}
.meta-label{font-size:11px;color:var(--muted);font-weight:500;}
.meta-input{padding:8px 11px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-family:'DM Sans',sans-serif;background:var(--bg);outline:none;color:var(--text);width:100%;}
.meta-input:focus{border-color:var(--teal);background:white;}
.meta-input[readonly]{background:#EFECE8;color:var(--muted);cursor:default;}
.meta-full{grid-column:1/-1;}

/* SECTION */
.section{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);margin-bottom:14px;overflow:hidden;}
.section-head{display:flex;align-items:center;gap:9px;padding:13px 16px;border-bottom:1px solid var(--border);background:#FAFAF8;}
.section-head svg{width:15px;height:15px;}
.section-title{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;}
.section-body{padding:14px 16px;}

/* DESTINATAIRES */
.dest-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px;min-height:10px;}
.dest-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:var(--teal-l);border:1px solid var(--teal);border-radius:20px;font-size:12.5px;color:var(--teal);font-weight:500;}
.dest-chip button{background:none;border:none;cursor:pointer;color:var(--teal);display:flex;align-items:center;padding:0;line-height:1;}
.dest-chip button svg{width:12px;height:12px;}
.dest-add-row{display:flex;gap:8px;align-items:center;}
.dest-row{display:flex;gap:8px;align-items:center;position:relative;}
.dest-suggestions{position:absolute;top:100%;left:0;right:60px;background:white;border:1px solid var(--border);border-radius:var(--r);z-index:50;max-height:160px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,.1);display:none;}
.dest-suggestions.open{display:block;}
.dest-sugg-item{padding:9px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--bg);}
.dest-sugg-item:hover{background:var(--teal-l);}
.dest-input{flex:1;padding:8px 11px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-family:'DM Sans',sans-serif;background:var(--bg);outline:none;color:var(--text);}
.dest-input:focus{border-color:var(--teal);background:white;}

/* PRÉSENTS */
.presents-tags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px;}
.present-tag{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:var(--blue-l);border:1px solid var(--blue);border-radius:20px;font-size:12.5px;color:var(--blue);font-weight:500;}
.present-tag button{background:none;border:none;cursor:pointer;color:var(--blue);display:flex;align-items:center;padding:0;}
.present-tag button svg{width:12px;height:12px;}

/* COMMENTAIRES */
.comment-area{width:100%;min-height:120px;padding:11px 13px;border:1px solid var(--border);border-radius:var(--r);font-size:14px;font-family:'DM Sans',sans-serif;background:var(--bg);outline:none;color:var(--text);resize:vertical;line-height:1.7;}
.comment-area:focus{border-color:var(--teal);background:white;}

/* PHOTOS */
.photo-add-btn{display:flex;align-items:center;gap:8px;padding:11px 15px;background:var(--bg);border:1.5px dashed var(--border2);border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--muted);width:100%;margin-bottom:12px;transition:.15s;}
.photo-add-btn:hover{border-color:var(--teal);color:var(--teal);}
.photo-add-btn svg{width:16px;height:16px;}
.photos-list{display:flex;flex-direction:column;gap:12px;margin-bottom:8px;}
.photo-item{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.photo-item-head{display:flex;align-items:center;gap:8px;padding:8px 12px;background:white;border-bottom:1px solid var(--border);}
.photo-item-num{font-family:'Syne',sans-serif;font-weight:700;font-size:11px;color:var(--teal);}
.photo-item-comment{flex:1;border:none;background:none;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;padding:0;}
.photo-item-comment::placeholder{color:var(--muted);}
.photo-item-actions{display:flex;gap:4px;}
.photo-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;}
.photo-btn:hover{background:var(--bg);}
.photo-btn svg{width:13px;height:13px;}
.photo-btn.del:hover{border-color:var(--red);color:var(--red);}
.photo-preview-img{width:100%;max-height:380px;object-fit:contain;display:block;background:#f0ede8;cursor:pointer;}

/* ANNOTATION CANVAS — plein écran, toolbar ultra-compacte */
.annotation-overlay{position:fixed;inset:0;background:#000;z-index:200;display:none;flex-direction:column;}
.annotation-overlay.open{display:flex;}
.annot-toolbar{display:flex;align-items:center;gap:5px;padding:6px 10px;background:#1A2B4A;flex-shrink:0;flex-wrap:wrap;}
.annot-tool{width:32px;height:32px;border-radius:7px;border:2px solid transparent;background:rgba(255,255,255,.15);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;}
.annot-tool.active{border-color:white;background:rgba(255,255,255,.3);}
.annot-tool svg{width:15px;height:15px;stroke:white;fill:none;}
.annot-colors{display:flex;gap:5px;align-items:center;}
.annot-color{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:.15s;flex-shrink:0;}
.annot-color.active{border-color:white;transform:scale(1.2);}
.annot-size{display:flex;align-items:center;gap:4px;}
.annot-size input{width:52px;accent-color:#0D7A6B;}
.annot-size span{font-size:10px;color:rgba(255,255,255,.7);white-space:nowrap;}
/* Zone canvas — prend TOUT l'espace disponible */
.annot-canvas-wrap{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#1a1a1a;}
#annotCanvas{display:block;cursor:crosshair;touch-action:none;}
.annot-actions{display:flex;gap:8px;padding:8px 12px;background:#1A2B4A;flex-shrink:0;}
.annot-btn{flex:1;padding:10px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;text-align:center;}
.annot-btn-cancel{background:rgba(255,255,255,.15);color:white;}
.annot-btn-ok{background:#0D7A6B;color:white;}

/* ENVOI */
.send-zone{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:16px;margin-bottom:80px;}
.send-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}

/* BOTTOM BAR */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:12px 16px;display:flex;gap:10px;z-index:15;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 15px;border-radius:var(--r);font-size:13.5px;font-weight:500;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:.15s;}
.btn-primary{background:var(--orange);color:white;}.btn-primary:hover{background:var(--orange-d);}
.btn-secondary{background:var(--card);color:var(--text);border:1px solid var(--border);}
.btn-teal{background:var(--teal);color:white;}
.btn-ghost{background:transparent;color:var(--muted);padding:8px 10px;}
.btn-lg{padding:11px 18px;font-size:14px;}
.btn svg{width:14px;height:14px;}
.field-error{border-color:var(--red)!important;background:#FFF0F0!important;}
.validation-banner{background:var(--red-l);border:1px solid #EFC0C0;border-radius:var(--r);padding:10px 14px;margin-bottom:12px;display:none;font-size:13px;color:var(--red);align-items:center;gap:8px;}
.validation-banner.show{display:flex;}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(40px);background:var(--text);color:white;padding:10px 16px;border-radius:var(--r);font-size:13px;font-weight:500;z-index:300;opacity:0;transition:.25s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* PDF MODAL */
.pdf-modal{position:fixed;inset:0;background:rgba(20,18,16,.7);z-index:150;display:none;align-items:center;justify-content:center;padding:16px;}
.pdf-modal.open{display:flex;}
.pdf-inner{background:white;border-radius:var(--rl);width:100%;max-width:860px;max-height:90vh;display:flex;flex-direction:column;}
.pdf-modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);}
.pdf-modal-title{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;}
.pdf-close{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.pdf-close svg{width:13px;height:13px;}
#pdfContent{overflow-y:auto;padding:20px;font-family:Arial,sans-serif;font-size:11px;flex:1;}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="tb-logo">
    <div class="tb-sq"><svg viewBox="0 0 24 24" stroke-width="2.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div>
    <span class="tb-name">Loué App</span>
  </div>
  <span class="tb-badge">Note de réunion</span>
  <div class="tb-right">
    <button class="btn btn-ghost" onclick="openPreview()" style="color:white;padding:6px 10px;font-size:12px">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      Aperçu
    </button>
  </div>
</div>

<div class="main">

  <!-- VALIDATION -->
  <div class="validation-banner" id="validationBanner">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="validationMsg"></span>
  </div>

  <!-- DESTINATAIRES (EN HAUT) -->
  <div class="section">
    <div class="section-head">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--teal)" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      <span class="section-title" style="color:var(--teal)">Destinataires <span style="color:var(--red)">*</span></span>
    </div>
    <div class="section-body">
      <!-- Moi automatique (affiché en chip fixe) -->
      <div style="margin-bottom:10px;font-size:12px;color:var(--muted)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12" style="margin-right:4px;vertical-align:middle"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Vous recevrez automatiquement une copie.
      </div>
      <!-- Chips destinataires ajoutés -->
      <div class="dest-chips" id="dest-chips"></div>
      <!-- Champ ajout avec suggestions - même structure que quitus -->
      <div class="dest-row">
        <input class="dest-input" id="dest-input" type="email" placeholder="nom@email.com" autocomplete="off"
          oninput="filterDest(this.value)"
          onkeydown="if(event.key==='Enter'){event.preventDefault();addDest();}">
        <div class="dest-suggestions" id="dest-sugg"></div>
        <button class="btn btn-secondary btn-sm" onclick="addDest()">+ Ajouter</button>
      </div>
    </div>
  </div>

  <!-- EN-TÊTE -->
  <div class="fiche-header">
    <div class="fiche-title-row">
      <div class="fiche-logo-box"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div>
      <div>
        <div class="fiche-main-title">NOTE DE RÉUNION</div>
        <div class="fiche-main-sub">Loué Menuiserie · Menuiserie · Charpente · Agencement</div>
      </div>
    </div>
    <div class="meta-grid">
      <div class="meta-field">
        <div class="meta-label">Date</div>
        <input class="meta-input" id="meta-date" readonly>
      </div>
      <div class="meta-field">
        <div class="meta-label">Rédigé par <span style="color:var(--red)">*</span></div>
        <input class="meta-input" id="meta-auteur" placeholder="Votre nom…" list="auteurs-list" autocomplete="off">
        <datalist id="auteurs-list"></datalist>
      </div>
      <div class="meta-field meta-full">
        <div class="meta-label">Chantier <span style="color:var(--red)">*</span></div>
        <input class="meta-input" id="meta-chantier" placeholder="Choisir ou saisir…" list="chantiers-list" autocomplete="off" oninput="onChantierChange(this.value)">
        <datalist id="chantiers-list"></datalist>
      </div>
      <div class="meta-field meta-full">
        <div class="meta-label">Objet / Titre de la réunion</div>
        <input class="meta-input" id="meta-objet" placeholder="Ex : Réunion de chantier semaine 14…">
      </div>
    </div>
  </div>

  <!-- COMMENTAIRES -->
  <div class="section">
    <div class="section-head">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--teal)" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      <span class="section-title" style="color:var(--teal)">Notes &amp; commentaires</span>
    </div>
    <div class="section-body">
      <textarea class="comment-area" id="meta-commentaires" placeholder="Points abordés, décisions prises…"></textarea>
    </div>
  </div>

  <!-- PHOTOS -->
  <div class="section">
    <div class="section-head">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--teal)" stroke-width="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
      <span class="section-title" style="color:var(--teal)">Photos &amp; croquis</span>
      <span style="font-size:11px;color:var(--muted);margin-left:4px">— une photo par page dans le PDF</span>
    </div>
    <div class="section-body">
      <input type="file" id="photo-input" accept="image/*" capture="environment" multiple style="display:none" onchange="handlePhotos(this.files)">
      <button class="photo-add-btn" onclick="document.getElementById('photo-input').click()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
        Prendre une photo ou choisir dans la galerie
      </button>
      <div class="photos-list" id="photos-list"></div>
    </div>
  </div>

</div><!-- /main -->

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <button class="btn btn-secondary" onclick="window.location.href='index.html'" style="padding:10px 14px">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="15 18 9 12 15 6"/></svg>
    Retour
  </button>
  <button class="btn btn-teal btn-lg" id="btn-envoyer" onclick="sendNote()" style="flex:1;justify-content:center">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
    Envoyer la note
  </button>
</div>

<!-- ANNOTATION CANVAS -->
<div class="annotation-overlay" id="annotOverlay">
  <div class="annot-toolbar">
    <button class="annot-tool active" id="tool-pen" onclick="setTool('pen')" title="Stylo">
      <svg viewBox="0 0 24 24" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>
    </button>
    <button class="annot-tool" id="tool-arrow" onclick="setTool('arrow')" title="Flèche">
      <svg viewBox="0 0 24 24" stroke-width="2"><line x1="5" y1="19" x2="19" y2="5"/><polyline points="10 5 19 5 19 14"/></svg>
    </button>
    <button class="annot-tool" id="tool-rect" onclick="setTool('rect')" title="Rectangle">
      <svg viewBox="0 0 24 24" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
    </button>
    <button class="annot-tool" id="tool-erase" onclick="setTool('erase')" title="Effacer">
      <svg viewBox="0 0 24 24" stroke-width="2"><path d="M20 20H7L3 16l10-10 7 7-3 4z"/><line x1="6.5" y1="17.5" x2="13" y2="11"/></svg>
    </button>
    <div class="annot-colors">
      <div class="annot-color active" style="background:#E53E3E" onclick="setColor('#E53E3E',this)"></div>
      <div class="annot-color" style="background:#D97706" onclick="setColor('#D97706',this)"></div>
      <div class="annot-color" style="background:#1454A0" onclick="setColor('#1454A0',this)"></div>
      <div class="annot-color" style="background:#196B3B" onclick="setColor('#196B3B',this)"></div>
      <div class="annot-color" style="background:#141210" onclick="setColor('#141210',this)"></div>
      <div class="annot-color" style="background:#FFF;border:1px solid #ccc" onclick="setColor('#FFFFFF',this)"></div>
    </div>
    <div class="annot-size">
      <span>Taille</span>
      <input type="range" min="1" max="20" value="3" id="annot-size" oninput="annotSize=+this.value">
    </div>
    <button class="annot-tool" onclick="undoAnnot()" title="Annuler">
      <svg viewBox="0 0 24 24" stroke-width="2"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 00-4-4H4"/></svg>
    </button>
  </div>
  <div class="annot-canvas-wrap">
    <canvas id="annotCanvas"></canvas>
  </div>
  <div class="annot-actions">
    <button class="annot-btn annot-btn-cancel" onclick="cancelAnnot()">Annuler</button>
    <button class="annot-btn annot-btn-ok" onclick="validateAnnot()">Valider</button>
  </div>
</div>

<!-- APERÇU PDF -->
<div class="pdf-modal" id="pdfModal">
  <div class="pdf-inner">
    <div class="pdf-modal-head">
      <span class="pdf-modal-title">Aperçu PDF</span>
      <button class="pdf-close" onclick="closePreview()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div id="pdfContent"></div>
  </div>
</div>

<div class="toast" id="toast"><span id="toastMsg"></span></div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw5M3sh6EFb0t_oXiZ7qUeQI60ePGredIz9UjjQAWSXUGoWx_M3p8QE0O7B5KqyBV8/exec';

// ── ÉTAT ──
let photos = [];
let destinataires = [];
let ALL_USERS = [];
let ALL_DEST_NOTES = [];
let MOI = {name:'', email:''};
let ALL_CHANTIERS_NOTE = [];
let annotCurrentIdx = null;
let annotTool = 'pen';
let annotColor = '#E53E3E';
let annotSize = 3;
let annotHistory = [];
let isDrawing = false;
let startX, startY, lastX, lastY;
let annotBgImage = null;

// ── INIT ──
(function(){
  const now = new Date();
  document.getElementById('meta-date').value =
    `${String(now.getDate()).padStart(2,'0')}/${String(now.getMonth()+1).padStart(2,'0')}/${now.getFullYear()}`;
  loadContacts();
})();

// ── CONTACTS ──
function loadContacts() {
  if(!APPS_SCRIPT_URL || APPS_SCRIPT_URL==='https://script.google.com/macros/s/AKfycbw5M3sh6EFb0t_oXiZ7qUeQI60ePGredIz9UjjQAWSXUGoWx_M3p8QE0O7B5KqyBV8/exec') return;
  window._noteCB = function(data) {
    clearTimeout(window._noteTO);
    if(data) {
      if(data.contacts) {
        const dlA = document.getElementById('auteurs-list'); dlA.innerHTML='';
        data.contacts.forEach(c=>{ dlA.innerHTML+=`<option value="${c.nom}">`; });
        const moiDefaut = data.contacts.find(c=>c.conducteurDefaut==='O');
        if(moiDefaut) MOI = {name:moiDefaut.nom, email:moiDefaut.email};
        ALL_DEST_NOTES = data.contactNotes||[];
        window._allContacts = data.contacts||[];
      }
      if(data.chantiers) {
        ALL_CHANTIERS_NOTE = data.chantiers;
        const dlC = document.getElementById('chantiers-list'); dlC.innerHTML='';
        data.chantiers.forEach(c=>{ dlC.innerHTML+=`<option value="${c.nom}">`; });
      }
    }
    delete window._noteCB; delete window._noteTO;
    const s=document.getElementById('_jsonp_note'); if(s) s.remove();
  };
  window._noteTO = setTimeout(()=>{ if(window._noteCB){delete window._noteCB;} },10000);
  const sc=document.createElement('script'); sc.id='_jsonp_note';
  sc.src=APPS_SCRIPT_URL+'?action=getContacts&callback=_noteCB&t='+Date.now();
  document.head.appendChild(sc);
}

// ── CHANTIER → pré-remplir conducteur MOI (identique à quitus) ──
function onChantierChange(val) {
  if(!val||!ALL_CHANTIERS_NOTE.length) return;
  const ch = ALL_CHANTIERS_NOTE.find(x=>x.nom.toLowerCase()===val.toLowerCase());
  if(ch && ch.conducteur) {
    const contact = ALL_DEST_NOTES.find(x=>x.nom&&x.nom.toLowerCase()===ch.conducteur.toLowerCase());
    if(contact) MOI = {name:contact.nom, email:contact.email};
    else {
      const cu = (window._allContacts||[]).find(x=>x.nom&&x.nom.toLowerCase()===ch.conducteur.toLowerCase());
      if(cu) MOI = {name:cu.nom, email:cu.email||''};
    }
  }
}

// ── DESTINATAIRES ──
// ── DESTINATAIRES — logique identique à quitus ──
function filterDest(val) {
  const sugg = document.getElementById('dest-sugg');
  if(!val || val.length < 1) { sugg.classList.remove('open'); return; }
  const m = ALL_DEST_NOTES.filter(u =>
    u.nom.toLowerCase().includes(val.toLowerCase()) ||
    u.email.toLowerCase().includes(val.toLowerCase())
  );
  if(!m.length) { sugg.classList.remove('open'); return; }
  sugg.innerHTML = m.map(u=>`<div class="dest-sugg-item" onclick="selectDest('${u.email}')">${u.nom} <small>${u.email}</small></div>`).join('');
  sugg.classList.add('open');
}
function selectDest(email) {
  document.getElementById('dest-input').value = email;
  document.getElementById('dest-sugg').classList.remove('open');
  addDest();
}
function addDest() {
  const input = document.getElementById('dest-input');
  const val = input.value.trim();
  if(!val) return;
  // Validation email basique — doit contenir @ et un point après
  if(!val.includes('@') || !val.includes('.')) {
    input.style.borderColor='var(--red)';
    input.placeholder='Email invalide — ex: nom@domaine.fr';
    setTimeout(()=>{ input.style.borderColor=''; input.placeholder='nom@email.com'; },3000);
    return;
  }
  if(destinataires.includes(val)) { input.value=''; return; }
  destinataires.push(val);
  renderDest();
  input.value='';
  document.getElementById('dest-list').classList.remove('open');
}
function removeDest(i) { destinataires.splice(i,1); renderDest(); }
function renderDest() {
  document.getElementById('dest-chips').innerHTML = destinataires.map((d,i)=>`
    <span class="dest-chip">${d}
      <button onclick="removeDest(${i})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </span>`).join('');
}

// ── PHOTOS ──
function handlePhotos(files) {
  Array.from(files).forEach(f=>{
    const reader = new FileReader();
    reader.onload = e=>{
      photos.push({dataUrl:e.target.result, mimeType:f.type, label:'', annotated:false});
      renderPhotos();
    };
    reader.readAsDataURL(f);
  });
}

function renderPhotos() {
  const list = document.getElementById('photos-list');
  list.innerHTML = photos.map((p,i)=>`
    <div class="photo-item">
      <div class="photo-item-head">
        <span class="photo-item-num">Photo ${i+1}</span>
        <input class="photo-item-comment" placeholder="Légende ou commentaire (optionnel)…"
          value="${p.label}" oninput="photos[${i}].label=this.value">
        <div class="photo-item-actions">
          <button class="photo-btn" onclick="openAnnot(${i})" title="Annoter">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg>
          </button>
          <button class="photo-btn del" onclick="removePhoto(${i})" title="Supprimer">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
          </button>
        </div>
      </div>
      <img class="photo-preview-img" src="${p.dataUrl}" alt="Photo ${i+1}" onclick="openAnnot(${i})">
    </div>`).join('');
}

function removePhoto(i) { photos.splice(i,1); renderPhotos(); }

// ── ANNOTATION CANVAS ──
let canvasListenersSet = false;

function openAnnot(idx) {
  annotCurrentIdx = idx;
  annotTool='pen'; annotColor='#E53E3E'; annotSize=3;

  // Reset boutons toolbar
  document.querySelectorAll('.annot-tool').forEach(t=>t.classList.remove('active'));
  document.getElementById('tool-pen').classList.add('active');
  document.querySelectorAll('.annot-color').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll('.annot-color')[0].classList.add('active');

  // Ouvrir l'overlay AVANT de mesurer les dimensions
  document.getElementById('annotOverlay').classList.add('open');
  document.body.style.overflow='hidden';

  // Double rAF : attendre 2 frames pour que le layout soit calculé
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      const canvas = document.getElementById('annotCanvas');
      const wrap   = canvas.parentElement;
      const maxW   = wrap.clientWidth  || window.innerWidth;
      const maxH   = wrap.clientHeight || (window.innerHeight - 130);

      const img = new Image();
      img.onload = ()=>{
        const ratio = Math.min(maxW / img.naturalWidth, maxH / img.naturalHeight, 1);
        const w = Math.round(img.naturalWidth  * ratio);
        const h = Math.round(img.naturalHeight * ratio);
        canvas.width  = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        annotHistory = [ctx.getImageData(0, 0, w, h)];
        if(!canvasListenersSet) {
          initCanvasEvents(canvas);
          canvasListenersSet = true;
        }
      };
      img.onerror = ()=>{ showToast('Erreur chargement image'); cancelAnnot(); };
      img.src = photos[idx].dataUrl;
    });
  });
}

function cancelAnnot() {
  document.getElementById('annotOverlay').classList.remove('open');
  document.body.style.overflow='';
  annotCurrentIdx = null;
}

function validateAnnot() {
  const canvas = document.getElementById('annotCanvas');
  photos[annotCurrentIdx].dataUrl = canvas.toDataURL('image/jpeg', 0.92);
  photos[annotCurrentIdx].annotated = true;
  document.getElementById('annotOverlay').classList.remove('open');
  document.body.style.overflow='';
  renderPhotos();
  annotCurrentIdx = null;
}

function setTool(t) {
  annotTool=t;
  document.querySelectorAll('.annot-tool[id^="tool-"]').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById('tool-'+t); if(el) el.classList.add('active');
  document.getElementById('annotCanvas').style.cursor = t==='erase'?'cell':'crosshair';
}

function setColor(c, el) {
  annotColor=c;
  document.querySelectorAll('.annot-color').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
}

function undoAnnot() {
  if(annotHistory.length<=1) return;
  annotHistory.pop();
  const canvas=document.getElementById('annotCanvas');
  canvas.getContext('2d').putImageData(annotHistory[annotHistory.length-1],0,0);
}

function initCanvasEvents(canvas) {
  // Supprimer les anciens listeners via un flag — pas de cloneNode qui efface le canvas
  canvas._annotBound = true;

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const src = e.touches ? e.touches[0] : e;
    return { x:(src.clientX-rect.left)*scaleX, y:(src.clientY-rect.top)*scaleY };
  }

  function down(e) {
    e.preventDefault(); isDrawing=true;
    const p=getPos(e); startX=p.x; startY=p.y; lastX=p.x; lastY=p.y;
    const ctx=canvas.getContext('2d');
    if(annotTool==='pen'||annotTool==='erase') {
      ctx.beginPath(); ctx.moveTo(p.x,p.y);
    }
    annotHistory.push(ctx.getImageData(0,0,canvas.width,canvas.height));
    if(annotHistory.length>30) annotHistory.shift();
  }

  function move(e) {
    e.preventDefault(); if(!isDrawing) return;
    const p=getPos(e);
    const ctx=canvas.getContext('2d');
    if(annotTool==='pen') {
      ctx.strokeStyle=annotColor; ctx.lineWidth=annotSize; ctx.lineCap='round'; ctx.lineJoin='round';
      ctx.lineTo(p.x,p.y); ctx.stroke();
      lastX=p.x; lastY=p.y;
    } else if(annotTool==='erase') {
      ctx.strokeStyle='rgba(255,255,255,1)'; ctx.lineWidth=annotSize*4; ctx.lineCap='round';
      ctx.lineTo(p.x,p.y); ctx.stroke();
      lastX=p.x; lastY=p.y;
    } else {
      ctx.putImageData(annotHistory[annotHistory.length-1],0,0);
      ctx.strokeStyle=annotColor; ctx.lineWidth=annotSize; ctx.lineCap='round';
      if(annotTool==='arrow') drawArrow(ctx,startX,startY,p.x,p.y);
      else if(annotTool==='rect') ctx.strokeRect(startX,startY,p.x-startX,p.y-startY);
    }
  }

  function up(e) {
    e.preventDefault(); isDrawing=false;
    canvas.getContext('2d').closePath();
  }

  // Retirer d'abord les anciens (au cas où on rouvre)
  canvas.removeEventListener('mousedown',canvas._down);
  canvas.removeEventListener('mousemove',canvas._move);
  canvas.removeEventListener('mouseup',canvas._up);
  canvas.removeEventListener('touchstart',canvas._tdown);
  canvas.removeEventListener('touchmove',canvas._tmove);
  canvas.removeEventListener('touchend',canvas._tup);

  // Sauvegarder les références pour pouvoir les retirer
  canvas._down=down; canvas._move=move; canvas._up=up;
  canvas._tdown=down; canvas._tmove=move; canvas._tup=up;

  canvas.addEventListener('mousedown',down);
  canvas.addEventListener('mousemove',move);
  canvas.addEventListener('mouseup',up);
  canvas.addEventListener('touchstart',down,{passive:false});
  canvas.addEventListener('touchmove',move,{passive:false});
  canvas.addEventListener('touchend',up,{passive:false});
}

function drawArrow(ctx, x1, y1, x2, y2) {
  const headLen = 18;
  const angle = Math.atan2(y2-y1, x2-x1);
  ctx.beginPath();
  ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
  ctx.lineTo(x2-headLen*Math.cos(angle-Math.PI/6), y2-headLen*Math.sin(angle-Math.PI/6));
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2-headLen*Math.cos(angle+Math.PI/6), y2-headLen*Math.sin(angle+Math.PI/6));
  ctx.stroke();
}

// ── APERÇU PDF ──
function openPreview() { buildPdfContent(); document.getElementById('pdfModal').classList.add('open'); }
function closePreview() { document.getElementById('pdfModal').classList.remove('open'); }
document.getElementById('pdfModal').addEventListener('click',e=>{if(e.target===document.getElementById('pdfModal'))closePreview();});

function buildPdfContent() {
  const chantier = document.getElementById('meta-chantier').value||'—';
  const auteur   = document.getElementById('meta-auteur').value||'—';
  const date     = document.getElementById('meta-date').value||'—';
  const objet    = document.getElementById('meta-objet').value||'';
  const comment  = document.getElementById('meta-commentaires').value||'';

  // ── Photos : 1 seule → dans la page 1 sous les notes
  //             2+ → 2 par page à partir de la page 2
  let photosInline = '';
  let photosPages  = '';

  if(photos.length === 1) {
    const p = photos[0];
    photosInline = `
      <div style="margin-top:10px;border:1.5px solid #0D7A6B;border-radius:5px;overflow:hidden">
        <div style="background:#E0F5F2;padding:5px 10px;border-bottom:1px solid #0D7A6B">
          <span style="font-size:9px;font-weight:700;color:#0D7A6B;text-transform:uppercase">Photo / Croquis${p.annotated?' ✏️':''}</span>
          ${p.label?`<span style="font-size:9px;color:#6A6460;margin-left:6px">— ${p.label}</span>`:''}
        </div>
        <div style="padding:8px;text-align:center">
          <img src="${p.dataUrl}" style="max-width:100%;max-height:130mm;width:auto;height:auto;display:block;margin:0 auto;">
        </div>
      </div>`;
  } else if(photos.length >= 2) {
    // Groupes de 2 photos par page
    for(let i=0; i<photos.length; i+=2) {
      const p1 = photos[i];
      const p2 = photos[i+1];
      photosPages += `<div style="page-break-before:always;padding:12px 10px;">
        <div style="font-size:9px;font-weight:700;color:#0D7A6B;margin-bottom:8px;border-bottom:2px solid #0D7A6B;padding-bottom:4px;text-transform:uppercase">
          Photos / Croquis — ${i+1}${p2?' & '+(i+2):''}
        </div>
        <div style="display:flex;gap:10px;height:calc(50% - 30px)">
          <div style="flex:1;text-align:center">
            <img src="${p1.dataUrl}" style="max-width:100%;max-height:120mm;width:auto;height:auto;display:block;margin:0 auto;border:1px solid #ddd;">
            ${p1.label?`<div style="margin-top:5px;font-size:10px;color:#6A6460">${p1.label}</div>`:''}
          </div>
          ${p2?`<div style="flex:1;text-align:center">
            <img src="${p2.dataUrl}" style="max-width:100%;max-height:120mm;width:auto;height:auto;display:block;margin:0 auto;border:1px solid #ddd;">
            ${p2.label?`<div style="margin-top:5px;font-size:10px;color:#6A6460">${p2.label}</div>`:''}
          </div>`:'<div style="flex:1"></div>'}
        </div>
      </div>`;
    }
  }

  document.getElementById('pdfContent').innerHTML = `
    <!-- EN-TÊTE -->
    <table style="width:100%;border-collapse:collapse;margin-bottom:12px;border-bottom:3px solid #0D7A6B;padding-bottom:10px">
      <tr>
        <td style="width:180px;vertical-align:top">
          <table style="width:100%;border-collapse:collapse;border:1.5px solid #D8D4CE">
            <tr><td style="padding:5px 8px;border-bottom:1px solid #E1DCD6">
              <div style="font-size:7.5px;font-weight:700;text-transform:uppercase;color:#6A6460;margin-bottom:2px">Date</div>
              <div style="font-size:12px;font-weight:700">${date}</div>
            </td></tr>
            <tr><td style="padding:5px 8px;border-bottom:1px solid #E1DCD6">
              <div style="font-size:7.5px;font-weight:700;text-transform:uppercase;color:#6A6460;margin-bottom:2px">Chantier</div>
              <div style="font-size:12px;font-weight:800;color:#1A2B4A">${chantier}</div>
            </td></tr>
            <tr><td style="padding:5px 8px">
              <div style="font-size:7.5px;font-weight:700;text-transform:uppercase;color:#6A6460;margin-bottom:2px">Rédigé par</div>
              <div style="font-size:11px;font-weight:600">${auteur}</div>
            </td></tr>
          </table>
        </td>
        <td style="vertical-align:top;padding:0 16px;text-align:center">
          <div style="font-weight:800;font-size:15px;color:#1A2B4A">Loué Menuiserie</div>
          <div style="font-size:9px;color:#6A6460;margin-bottom:8px">Menuiserie · Charpente · Agencement</div>
          <div style="font-weight:800;font-size:14px;color:#0D7A6B">NOTE DE RÉUNION</div>
          ${objet?`<div style="margin-top:4px;font-size:11px;color:#141210;font-weight:600">${objet}</div>`:''}
        </td>
      </tr>
    </table>
    <!-- COMMENTAIRES -->
    ${comment?`<div style="padding:10px 12px;background:#F0F5F4;border:1.5px solid #0D7A6B;border-radius:5px;margin-bottom:10px">
      <div style="font-size:8px;font-weight:700;text-transform:uppercase;color:#0D7A6B;margin-bottom:6px;letter-spacing:.5px">Notes &amp; commentaires</div>
      <div style="font-size:11px;line-height:1.7;white-space:pre-wrap">${comment}</div>
    </div>`:''}
    <!-- 1 PHOTO → inline page 1 -->
    ${photosInline}
    <!-- 2+ PHOTOS → 2 par page à partir de la page 2 -->
    ${photosPages}`;
}

// ── ENVOI ──
async function sendNote() {
  let errors = [];
  const ci = document.getElementById('meta-chantier');
  const ai = document.getElementById('meta-auteur');
  if(!ci.value.trim()){ ci.classList.add('field-error'); errors.push('Chantier manquant'); } else ci.classList.remove('field-error');
  if(!ai.value.trim()){ ai.classList.add('field-error'); errors.push('Rédigé par manquant'); } else ai.classList.remove('field-error');

  if(errors.length) {
    const b=document.getElementById('validationBanner');
    document.getElementById('validationMsg').textContent=errors.join(' — ');
    b.classList.add('show'); setTimeout(()=>b.classList.remove('show'),7000); return;
  }
  document.getElementById('validationBanner').classList.remove('show');

  const btn = document.getElementById('btn-envoyer');
  btn.disabled=true;
  btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Envoi…';

  // Compression photos
  const photosB64 = await Promise.all(photos.map(p=>compressPhoto(p)));

  const tousDestinataires = [...new Set([
    ...(MOI.email ? [MOI.email] : []),
    ...destinataires,
  ])];

  const payload = {
    type        : 'note',
    chantier    : ci.value,
    auteur      : ai.value,
    date        : document.getElementById('meta-date').value,
    objet       : document.getElementById('meta-objet').value,
    commentaires: document.getElementById('meta-commentaires').value,
    destinataires: tousDestinataires,
    photosBase64: photosB64,
  };

  try {
    await fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    showToast('✓ Note envoyée !');
  } catch(e){ showToast('Erreur réseau'); console.error(e); }
  finally {
    btn.disabled=false;
    btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg> Envoyer la note';
  }
}

async function compressPhoto(p) {
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=1200;
      let w=img.naturalWidth, h=img.naturalHeight;
      if(w>MAX||h>MAX){ if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;} }
      const canvas=document.createElement('canvas'); canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const data=canvas.toDataURL('image/jpeg',.72).split(',')[1];
      resolve({data, mimeType:'image/jpeg', label:p.label||''});
    };
    img.src=p.dataUrl;
  });
}

function showToast(m){ const t=document.getElementById('toast'); document.getElementById('toastMsg').textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3500); }

// Fermer suggestions au clic dehors
document.addEventListener('click',e=>{ if(!e.target.closest('.dest-row')) document.getElementById('dest-sugg').classList.remove('open'); });
</script>

<script>
const APPS_SCRIPT_URL = 'TA_NOUVELLE_URL_DE_DEPLOYEMENT'; // <--- ATTENTION À BIEN METTRE LA DERNIERE URL

let rows = [];
let solMode = "Non défini"; // Valeur par défaut
let socleMode = "NON";

function setSolMode(mode) {
    solMode = mode;
    // Visuel
    document.querySelectorAll('.pcase').forEach(el => el.classList.remove('active-gen'));
    event.currentTarget.classList.add('active-gen');
    renderTable(); // Rafraichit pour afficher le texte bleu dans le tableau
}

function setSocle(val) {
    socleMode = val ? "OUI" : "NON";
    document.getElementById('socle-oui').classList.toggle('active-att', val);
    document.getElementById('socle-non').classList.toggle('active-gen', !val);
}

// ... (Gardes tes fonctions addRow et updateRow classiques) ...

async function sendDoc() {
    if(rows.length === 0) return alert("Tableau vide");

    const payload = {
        action: 'submitCotes',
        ref: document.getElementById('fiche-ref').innerText,
        chantier: document.getElementById('meta-chantier').value,
        batiment: document.getElementById('meta-batiment').value,
        auteur: document.getElementById('meta-auteur').value,
        date: document.getElementById('meta-date').value,
        solMode: solMode,
        socle: socleMode,
        commentaires: document.getElementById('commentaires').value,
        lignes: rows
    };

    // DEBUG : Affiche ce qui va être envoyé (Supprime cette ligne après test)
    console.log("Envoi du payload:", payload);

    const btn = document.getElementById('btn-envoyer');
    btn.innerText = "Envoi en cours...";
    btn.disabled = true;

    try {
        await fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(payload)
        });
        alert("Envoyé !");
    } catch (e) {
        alert("Erreur");
    } finally {
        btn.innerText = "Envoyer l'alerte";
        btn.disabled = false;
    }
}
</script>
